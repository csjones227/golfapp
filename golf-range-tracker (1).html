<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Golf Range Practice Tracker">
<title>Golf Range Practice Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #2D8C5E;
    --green-light: #E8F5EE;
    --green-mid: #4CAF82;
    --amber: #C47B1A;
    --amber-light: #FDF3E3;
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --border: rgba(0,0,0,0.08);
    --text: #1A1A18;
    --muted: #7A7A72;
    --faint: #AEADA6;
    --radius: 14px;
    --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --green: #4CAF82;
      --green-light: #0F2E1E;
      --green-mid: #3A9E6E;
      --amber: #E0991F;
      --amber-light: #2A1E08;
      --bg: #111110;
      --surface: #1C1C1A;
      --border: rgba(255,255,255,0.08);
      --text: #F0EFE8;
      --muted: #8A8A82;
      --faint: #5A5A52;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }

  #app { height: 100%; display: flex; flex-direction: column; max-width: 430px; margin: 0 auto; }

  /* Screens */
  .screen { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .screen.active { display: flex; }

  /* Header */
  .header {
    padding: env(safe-area-inset-top, 16px) 20px 0;
    padding-top: max(env(safe-area-inset-top), 16px);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .header-inner { display: flex; align-items: center; padding-bottom: 14px; gap: 12px; }
  .header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; flex: 1; }
  .icon-btn { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 22px; padding: 4px; display: flex; align-items: center; border-radius: 8px; }
  .icon-btn:active { background: var(--border); }

  /* Scroll area */
  .scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: max(env(safe-area-inset-bottom), 24px); }

  /* Buttons */
  .btn-green {
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 15px 20px;
    font-size: 15px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    width: 100%;
    letter-spacing: -0.2px;
  }
  .btn-green:active { opacity: 0.85; transform: scale(0.99); }
  .btn-outline {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 20px;
    font-size: 15px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    width: 100%;
  }
  .btn-outline:active { background: var(--bg); }

  /* Home screen */
  .home-top {
    background: var(--surface);
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .home-top h2 { font-size: 13px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 16px; }

  .streak-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .streak-card {
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 12px;
    text-align: center;
  }
  .streak-card .val { font-size: 22px; font-weight: 600; color: var(--text); font-family: 'DM Mono', monospace; }
  .streak-card .lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .section-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; padding: 20px 20px 10px; }

  .session-card {
    margin: 0 16px 10px;
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: transform 0.1s;
  }
  .session-card:active { transform: scale(0.99); }
  .session-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .session-date { font-size: 13px; color: var(--muted); }
  .session-score-badge {
    background: var(--green-light);
    color: var(--green);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .skill-bars { display: flex; gap: 5px; align-items: flex-end; height: 28px; }
  .skill-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .skill-bar-track { width: 100%; height: 20px; background: var(--bg); border-radius: 4px; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; }
  .skill-bar-fill { width: 100%; background: var(--green); border-radius: 4px; transition: height 0.3s ease; }
  .skill-bar-lbl { font-size: 9px; color: var(--faint); font-family: 'DM Mono', monospace; }
  .session-notes-preview { font-size: 12px; color: var(--muted); margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .empty-state { text-align: center; padding: 64px 32px; }
  .empty-icon { font-size: 48px; color: var(--faint); margin-bottom: 16px; }
  .empty-title { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 8px; }
  .empty-sub { font-size: 14px; color: var(--muted); line-height: 1.5; }

  /* Log screen */
  .log-date-row { padding: 16px 20px 0; }
  .field-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .date-input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    width: 100%;
  }
  .date-input:focus { outline: 2px solid var(--green); outline-offset: 1px; }

  .skill-entry {
    margin: 0 16px;
    padding: 16px;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }
  .skill-entry-name { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .skill-entry-desc { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
  .skill-entry-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .skip-toggle { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); flex-shrink: 0; cursor: pointer; padding-top: 2px; white-space: nowrap; }
  .skip-toggle input { width: 15px; height: 15px; accent-color: var(--amber); cursor: pointer; }
  .pip-row { display: flex; gap: 8px; }
  .pip {
    flex: 1;
    aspect-ratio: 1;
    max-width: 56px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--bg);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 600;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    transition: all 0.15s;
  }
  .pip.on { background: var(--green); border-color: var(--green); color: #fff; }
  .pip:active { transform: scale(0.92); }

  .score-footer {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 14px 20px;
    padding-bottom: max(env(safe-area-inset-bottom, 20px), 80px);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .score-display { flex: 0 0 auto; }
  .score-num { font-size: 26px; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--green); line-height: 1; }
  .score-denom { font-size: 13px; color: var(--muted); }
  .score-footer .btn-green { flex: 1; padding: 18px 16px; font-size: 17px; }

  /* Notes */
  .notes-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    width: 100%;
    min-height: 72px;
    resize: none;
  }
  .notes-area::placeholder { color: var(--faint); }
  .notes-area:focus { outline: 2px solid var(--green); outline-offset: 1px; }

  /* Detail screen */
  .detail-hero {
    padding: 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .detail-score-big { font-size: 48px; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--green); line-height: 1; }
  .detail-score-sub { font-size: 14px; color: var(--muted); margin-top: 4px; }
  .detail-pct { font-size: 20px; font-weight: 600; color: var(--text); }

  .skill-detail-row {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .sdk-name { font-size: 14px; font-weight: 500; color: var(--text); flex: 1; }
  .sdk-pips { display: flex; gap: 4px; }
  .sdk-pip { width: 12px; height: 12px; border-radius: 50%; background: var(--bg); border: 1px solid var(--border); }
  .sdk-pip.on { background: var(--green); border-color: var(--green); }
  .sdk-val { font-size: 14px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--text); min-width: 26px; text-align: right; }

  /* Stats screen */
  .stats-big-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 16px; }
  .big-stat {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 16px;
  }
  .big-stat .val { font-size: 28px; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--text); }
  .big-stat .lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .insight-card {
    margin: 0 16px 10px;
    padding: 14px 16px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 14px;
  }
  .insight-icon { font-size: 20px; }
  .insight-text b { font-weight: 600; }
  .insight-text { color: var(--text); line-height: 1.4; }

  .chart-container { padding: 0 16px 16px; position: relative; height: 200px; }

  .skill-avg-row {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sa-name { font-size: 13px; color: var(--text); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sa-track { flex: 1.5; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
  .sa-fill { height: 100%; border-radius: 3px; background: var(--green); }
  .sa-val { font-size: 13px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--text); min-width: 30px; text-align: right; }

  .delete-btn {
    margin: 16px;
    background: none;
    border: 1px solid rgba(200,50,50,0.25);
    border-radius: var(--radius-sm);
    color: #C03030;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    padding: 12px;
    width: calc(100% - 32px);
    cursor: pointer;
  }
  .delete-btn:active { background: rgba(200,50,50,0.07); }

  .divider { height: 8px; background: var(--bg); }
  .pad { padding: 16px; }
  .pad-h { padding: 0 16px; }
  .gap { height: 12px; }
</style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div id="screen-home" class="screen active">
    <div class="header">
      <div class="header-inner">
        <h1>⛳ Golf Range Practice</h1>
        <button class="icon-btn" onclick="goStats()" aria-label="Statistics" title="Statistics">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg>
        </button>
      </div>
    </div>
    <div class="scroll">
      <div class="home-top">
        <h2>Overview</h2>
        <div class="streak-row" id="home-stats"></div>
        <button class="btn-green" onclick="goLog()">+ Log new session</button>
      </div>
      <div class="section-title">Sessions</div>
      <div id="sessions-list"></div>
    </div>
  </div>

  <!-- LOG -->
  <div id="screen-log" class="screen" style="flex-direction:column;">
    <div class="header">
      <div class="header-inner">
        <button class="icon-btn" onclick="goHome()" aria-label="Back">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <h1>New session</h1>
      </div>
    </div>
    <div class="scroll">
      <div class="log-date-row">
        <div class="field-label">Date</div>
        <input type="date" class="date-input" id="log-date">
        <div class="gap"></div>
      </div>
      <div id="skill-inputs"></div>
      <div class="divider"></div>
      <div class="pad">
        <div class="field-label" style="margin-bottom:8px;">Notes</div>
        <textarea class="notes-area" id="log-notes" placeholder="How did it feel? Anything to remember…"></textarea>
      </div>
    </div>
    <div class="score-footer">
      <div class="score-display">
        <div class="score-num" id="log-score-num">0</div>
        <div class="score-denom" id="score-denom">out of 40</div>
      </div>
      <button class="btn-green" onclick="saveSession()">Save session</button>
    </div>
  </div>

  <!-- DETAIL -->
  <div id="screen-detail" class="screen">
    <div class="header">
      <div class="header-inner">
        <button class="icon-btn" onclick="goHome()" aria-label="Back">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <h1 id="detail-date-title">Session</h1>
      </div>
    </div>
    <div class="scroll">
      <div class="detail-hero">
        <div>
          <div class="detail-score-big" id="detail-score"></div>
          <div class="detail-score-sub" id="detail-sub"></div>
        </div>
        <div style="margin-left:auto; text-align:right;">
          <div class="detail-pct" id="detail-pct"></div>
          <div style="font-size:12px; color:var(--muted);">accuracy</div>
        </div>
      </div>
      <div id="detail-skills"></div>
      <div id="detail-notes-wrap"></div>
      <button class="delete-btn" onclick="deleteSession()">Delete session</button>
    </div>
  </div>

  <!-- STATS -->
  <div id="screen-stats" class="screen">
    <div class="header">
      <div class="header-inner">
        <button class="icon-btn" onclick="goHome()" aria-label="Back">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <h1>Statistics</h1>
      </div>
    </div>
    <div class="scroll" id="stats-scroll"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
const SKILLS = [
  { id:'drv',   name:'Driver',           short:'Drv', desc:'8 shots on the fairway (40-yard area)',      max:8  },
  { id:'pw',    name:'Pitching wedge',   short:'PW',  desc:'8 shots within 10-yard radius',               max:8  },
  { id:'hyb',   name:'Hybrid',           short:'Hyb', desc:'8 shots within 30-yard target area',          max:8  },
  { id:'7i',    name:'7 iron',           short:'7i',  desc:'8 shots within 20-yard target area',          max:8  },
  { id:'chip',  name:'Chip shots',       short:'Chp', desc:'10 chips within 5 feet of the hole',          max:10 },
  { id:'putt5', name:'5-foot putts',     short:'5ft', desc:'5 putts made at 5 feet',                      max:5  },
  { id:'dist',  name:'Distance control', short:'DC',  desc:'5 putts from 12 feet — must reach hole, not roll more than 4 ft past', max:5 },
  { id:'lag',   name:'Lag putts',        short:'Lag', desc:'5 putts from 35+ ft within 5-foot radius',    max:5  },
];
const MAX_SCORE = SKILLS.reduce((a,s)=>a+s.max,0); // 56

let sessions = [];
let curScores = SKILLS.map(()=>0);
let curSkipped = SKILLS.map(()=>false);
let viewIdx = -1;
let tChart = null;

function load() {
  try { sessions = JSON.parse(localStorage.getItem('golf_sessions') || '[]'); } catch(e) { sessions = []; }
}
function save() {
  localStorage.setItem('golf_sessions', JSON.stringify(sessions));
}

function fmtDate(d) {
  const dt = new Date(d + 'T12:00:00');
  return dt.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' });
}

// Backward-compatible accessor: older saved sessions have no `skipped` array
function isSkipped(s, i) { return !!(s.skipped && s.skipped[i]); }

// Sum of points earned across completed (non-skipped) drills only
function total(s) {
  return SKILLS.reduce((a,sk,i) => a + (isSkipped(s,i) ? 0 : (s.scores[i]||0)), 0);
}
// Max possible score for this session, given which drills were actually completed
function sessionMax(s) {
  return SKILLS.reduce((a,sk,i) => a + (isSkipped(s,i) ? 0 : sk.max), 0);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  renderHome();
  showScreen('screen-home');
}
function goLog() {
  initLog();
  showScreen('screen-log');
}
function goStats() {
  renderStats();
  showScreen('screen-stats');
}

function renderHome() {
  const sorted = [...sessions].sort((a,b)=>b.ts-a.ts);
  const pctOf = s => { const m = sessionMax(s); return m > 0 ? (total(s)/m*100) : 0; };
  const pcts = sessions.map(pctOf);
  const bestPct = pcts.length ? Math.round(Math.max(...pcts)) : 0;
  const avgPct = pcts.length ? Math.round(pcts.reduce((a,b)=>a+b,0)/pcts.length) : 0;

  document.getElementById('home-stats').innerHTML = `
    <div class="streak-card"><div class="val">${sessions.length}</div><div class="lbl">Sessions</div></div>
    <div class="streak-card"><div class="val">${avgPct}%</div><div class="lbl">Avg accuracy</div></div>
    <div class="streak-card"><div class="val">${bestPct}%</div><div class="lbl">Best</div></div>`;

  const list = document.getElementById('sessions-list');
  if (!sessions.length) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🏌️</div>
      <div class="empty-title">No sessions yet</div>
      <div class="empty-sub">Head to the range and log your first session to start tracking progress.</div>
    </div>`;
    return;
  }
  list.innerHTML = sorted.map(s => {
    const t = total(s);
    const sMax = sessionMax(s);
    const pct = sMax > 0 ? Math.round(t/sMax*100) : 0;
    const origIdx = sessions.indexOf(s);
    const bars = SKILLS.map((sk,i) => {
      const skipped = isSkipped(s,i);
      const h = skipped ? 4 : Math.max(8, Math.round((s.scores[i]||0)/sk.max*20));
      const opacity = skipped ? 'opacity:0.25;' : '';
      return `<div class="skill-bar-wrap" style="${opacity}">
        <div class="skill-bar-track"><div class="skill-bar-fill" style="height:${h}px;${skipped?'background:var(--faint);':''}"></div></div>
        <div class="skill-bar-lbl">${sk.short}</div>
      </div>`;
    }).join('');
    return `<div class="session-card" onclick="viewSession(${origIdx})">
      <div class="session-top">
        <div class="session-date">${fmtDate(s.date)}</div>
        <div class="session-score-badge">${t} / ${sMax}</div>
      </div>
      <div class="skill-bars">${bars}</div>
      ${s.notes ? `<div class="session-notes-preview">${s.notes}</div>` : ''}
    </div>`;
  }).join('');
}

function initLog() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('log-date').value = today;
  curScores = SKILLS.map(()=>0);
  curSkipped = SKILLS.map(()=>false);
  document.getElementById('log-notes').value = '';

  const container = document.getElementById('skill-inputs');
  container.innerHTML = SKILLS.map((sk, si) => {
    const pipRowStyle = sk.max > 5 ? 'display:flex;gap:5px;flex-wrap:wrap;' : 'display:flex;gap:8px;';
    const pipBtnStyle = sk.max > 5 ? 'style="flex:0 0 calc(20% - 4px);max-width:48px;"' : '';
    const pips = Array.from({length:sk.max},(_,i)=>i+1).map(n=>`<button class="pip" ${pipBtnStyle} id="pip-${si}-${n}" onclick="setPip(${si},${n})">${n}</button>`).join('');
    return `<div style="margin: 0 16px 10px;">
      <div class="skill-entry">
        <div class="skill-entry-top">
          <div>
            <div class="skill-entry-name">${sk.name}</div>
            <div class="skill-entry-desc">${sk.desc}</div>
          </div>
          <label class="skip-toggle">
            <input type="checkbox" id="skip-${si}" onchange="toggleSkip(${si})">
            <span>Didn't do this drill</span>
          </label>
        </div>
        <div id="pip-row-${si}" style="${pipRowStyle}">${pips}</div>
      </div>
    </div>`;
  }).join('');
  updateLogScore();
}

function toggleSkip(si) {
  curSkipped[si] = document.getElementById(`skip-${si}`).checked;
  const row = document.getElementById(`pip-row-${si}`);
  row.style.opacity = curSkipped[si] ? '0.35' : '1';
  row.style.pointerEvents = curSkipped[si] ? 'none' : 'auto';
  if (curSkipped[si]) {
    // Clear any score for a skipped drill so it can't count
    curScores[si] = 0;
    for (let n=1;n<=SKILLS[si].max;n++) {
      const el = document.getElementById(`pip-${si}-${n}`);
      if (el) el.classList.remove('on');
    }
  }
  updateLogScore();
}

function setPip(si, val) {
  if (curSkipped[si]) return;
  curScores[si] = curScores[si] === val ? 0 : val;
  for (let n=1;n<=SKILLS[si].max;n++) {
    const el = document.getElementById(`pip-${si}-${n}`);
    if (el) el.classList.toggle('on', n <= curScores[si]);
  }
  updateLogScore();
}

function updateLogScore() {
  const t = SKILLS.reduce((a,sk,i)=> a + (curSkipped[i] ? 0 : (curScores[i]||0)), 0);
  const m = SKILLS.reduce((a,sk,i)=> a + (curSkipped[i] ? 0 : sk.max), 0);
  document.getElementById('log-score-num').textContent = t;
  document.getElementById('score-denom').textContent = `out of ${m}`;
}

function saveSession() {
  const date = document.getElementById('log-date').value;
  if (!date) { alert('Please pick a date.'); return; }
  const notes = document.getElementById('log-notes').value.trim();
  sessions.push({ date, scores:[...curScores], skipped:[...curSkipped], notes, ts:Date.now() });
  save();
  goHome();
}

function viewSession(idx) {
  viewIdx = idx;
  const s = sessions[idx];
  const t = total(s);
  const sMax = sessionMax(s);
  const pct = sMax > 0 ? Math.round(t/sMax*100) : 0;
  document.getElementById('detail-date-title').textContent = fmtDate(s.date);
  document.getElementById('detail-score').textContent = t;
  document.getElementById('detail-sub').textContent = `out of ${sMax}`;
  document.getElementById('detail-pct').textContent = pct + '%';

  document.getElementById('detail-skills').innerHTML = SKILLS.map((sk,i) => {
    const skipped = isSkipped(s,i);
    const v = s.scores[i] || 0;
    if (skipped) {
      return `<div class="skill-detail-row" style="opacity:0.5;">
        <div class="sdk-name">${sk.name}</div>
        <div class="sdk-val" style="min-width:auto; font-family:'DM Sans',sans-serif; font-weight:400; font-style:italic; color:var(--muted);">Not completed</div>
      </div>`;
    }
    const pips = Array.from({length:sk.max},(_,j)=>j+1).map(n => `<div class="sdk-pip ${n<=v?'on':''}"></div>`).join('');
    return `<div class="skill-detail-row">
      <div class="sdk-name">${sk.name}</div>
      <div class="sdk-pips">${pips}</div>
      <div class="sdk-val">${v}/${sk.max}</div>
    </div>`;
  }).join('');

  document.getElementById('detail-notes-wrap').innerHTML = s.notes
    ? `<div class="pad" style="border-top:1px solid var(--border);">
        <div class="field-label" style="margin-bottom:8px;">Notes</div>
        <div style="font-size:14px; color:var(--muted); line-height:1.6; font-style:italic;">"${s.notes}"</div>
       </div>` : '';

  showScreen('screen-detail');
}

function deleteSession() {
  if (!confirm('Delete this session? This cannot be undone.')) return;
  sessions.splice(viewIdx, 1);
  save();
  goHome();
}

function renderStats() {
  const scroll = document.getElementById('stats-scroll');
  if (!sessions.length) {
    scroll.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📊</div>
      <div class="empty-title">No data yet</div>
      <div class="empty-sub">Log some sessions to see your stats and trends here.</div>
    </div>`;
    return;
  }

  // Use percent accuracy per session since the possible max can vary
  // depending on which drills were actually completed that day.
  const pctOf = s => { const m = sessionMax(s); return m > 0 ? (total(s)/m*100) : 0; };
  const pcts = sessions.map(pctOf);
  const bestPct = Math.round(Math.max(...pcts));
  const avgPct = Math.round(pcts.reduce((a,b)=>a+b,0)/pcts.length);
  const avgScore = Math.round(sessions.reduce((a,s)=>a+total(s),0)/sessions.length*10)/10;

  // Average per skill, counting only sessions where that drill was completed
  const avgBySkill = SKILLS.map((sk,i) => {
    const completed = sessions.filter(s => !isSkipped(s,i));
    if (!completed.length) return null;
    return Math.round(completed.reduce((a,s)=>a+(s.scores[i]||0),0)/completed.length*10)/10;
  });
  const ranked = avgBySkill.map((v,i)=>({v,i})).filter(x=>x.v!==null);
  const bestSkill = ranked.length ? SKILLS[ranked.reduce((a,b)=> b.v/SKILLS[b.i].max > a.v/SKILLS[a.i].max ? b : a).i] : null;
  const worstSkill = ranked.length ? SKILLS[ranked.reduce((a,b)=> b.v/SKILLS[b.i].max < a.v/SKILLS[a.i].max ? b : a).i] : null;

  const chartSessions = [...sessions].sort((a,b)=>a.ts-b.ts).slice(-12);
  const chartLabels = chartSessions.map(s => {
    const dt = new Date(s.date+'T12:00:00');
    return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  });
  const chartData = chartSessions.map(s => Math.round(pctOf(s)));

  scroll.innerHTML = `
    <div class="stats-big-row">
      <div class="big-stat"><div class="val">${sessions.length}</div><div class="lbl">Total sessions</div></div>
      <div class="big-stat"><div class="val">${avgScore}</div><div class="lbl">Average score</div></div>
      <div class="big-stat"><div class="val">${bestPct}%</div><div class="lbl">Best accuracy</div></div>
      <div class="big-stat"><div class="val">${avgPct}%</div><div class="lbl">Avg accuracy</div></div>
    </div>
    ${bestSkill ? `<div class="insight-card" style="background:var(--green-light); border-color:transparent;">
      <div class="insight-icon">💪</div>
      <div class="insight-text">Strongest skill: <b>${bestSkill.name}</b> (avg ${avgBySkill[SKILLS.indexOf(bestSkill)]}/${bestSkill.max})</div>
    </div>` : ''}
    ${worstSkill ? `<div class="insight-card" style="background:var(--amber-light); border-color:transparent;">
      <div class="insight-icon">🎯</div>
      <div class="insight-text">Needs most work: <b>${worstSkill.name}</b> (avg ${avgBySkill[SKILLS.indexOf(worstSkill)]}/${worstSkill.max})</div>
    </div>` : ''}
    <div class="section-title">Skill averages</div>
    <div style="border-top:1px solid var(--border);">
      ${SKILLS.map((sk,i)=> avgBySkill[i] === null
        ? `<div class="skill-avg-row"><div class="sa-name">${sk.name}</div><div class="sa-val" style="margin-left:auto; font-family:'DM Sans',sans-serif; font-weight:400; font-style:italic; color:var(--muted);">No data yet</div></div>`
        : `<div class="skill-avg-row">
        <div class="sa-name">${sk.name}</div>
        <div class="sa-track"><div class="sa-fill" style="width:${avgBySkill[i]/sk.max*100}%"></div></div>
        <div class="sa-val">${avgBySkill[i]}/${sk.max}</div>
      </div>`).join('')}
    </div>
    <div class="section-title">Accuracy trend</div>
    <div class="chart-container"><canvas id="stats-chart" role="img" aria-label="Line chart of accuracy percentage trend over last sessions">Accuracy trend chart.</canvas></div>
  `;

  if (tChart) { tChart.destroy(); tChart = null; }
  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const gridColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
  const tickColor = isDark ? '#6A6A62' : '#AEADA6';

  tChart = new Chart(document.getElementById('stats-chart'), {
    type: 'line',
    data: {
      labels: chartLabels,
      datasets: [{
        data: chartData,
        borderColor: '#2D8C5E',
        backgroundColor: isDark ? 'rgba(45,140,94,0.1)' : 'rgba(45,140,94,0.08)',
        borderWidth: 2,
        pointBackgroundColor: '#2D8C5E',
        pointRadius: 4,
        pointHoverRadius: 6,
        tension: 0.35,
        fill: true,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.y}%` } } },
      scales: {
        y: { min:0, max:100, ticks:{ stepSize:20, color:tickColor, font:{family:'DM Mono',size:11}, callback:v=>v+'%' }, grid:{ color:gridColor } },
        x: { ticks:{ color:tickColor, font:{family:'DM Mono',size:10}, maxRotation:40, autoSkip:false }, grid:{ display:false } }
      }
    }
  });
}

load();
renderHome();
</script>
</body>
</html>
